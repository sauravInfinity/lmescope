<svg width="100%" viewBox="0 0 680 870" role="img" xmlns="http://www.w3.org/2000/svg">
<title>LME React Native app architecture</title>
<desc>A layered architecture diagram showing the mobile app's presentation layer, state management, native device modules and storage, and networking and notifications layer, connecting a mobile user down to a backend API server and Firebase Cloud Messaging.</desc>
<defs>
  <filter id="glow-svg">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#8892A8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  .title-text{font-family:'Plus Jakarta Sans',Inter,sans-serif;font-size:14px;fill:#E8EDF5;font-weight:600;}
  .title-sub{font-family:'Plus Jakarta Sans',Inter,sans-serif;font-size:12px;fill:#8892A8;}
  .layer-title{font-family:'JetBrains Mono',monospace;font-size:12px;fill:#8892A8;letter-spacing:0.06em;text-transform:uppercase;font-weight:500;}
  .box{fill:#1A212E;stroke:#2A3345;stroke-width:1;rx:10;}
  .box-purple{fill:rgba(108,92,231,0.12);stroke:#6C5CE7;stroke-width:1;rx:10;}
  .box-green{fill:rgba(0,184,148,0.08);stroke:#00B894;stroke-width:1;rx:10;}
  .box-orange{fill:rgba(225,112,85,0.08);stroke:#E17055;stroke-width:1;rx:10;}
  .box-blue{fill:rgba(45,74,140,0.1);stroke:#5B7FC7;stroke-width:1;rx:10;}
  .box-gray{fill:rgba(42,51,69,0.5);stroke:#3A4560;stroke-width:1;rx:10;}
  .container{fill:none;stroke:#3A4560;stroke-width:1;stroke-dasharray:4 4;rx:16;}
  .box-text{font-family:'Plus Jakarta Sans',Inter,sans-serif;font-size:14px;fill:#E8EDF5;font-weight:600;text-anchor:middle;dominant-baseline:central;}
  .box-sub{font-family:'Plus Jakarta Sans',Inter,sans-serif;font-size:12px;fill:#8892A8;text-anchor:middle;dominant-baseline:central;}
</style>

<!-- Mobile App Title -->
<rect x="240" y="20" width="200" height="56" rx="10" fill="#1A212E" stroke="#2A3345"/>
<text x="340" y="37" class="box-text" font-size="14">Mobile app</text>
<text x="340" y="55" class="box-sub" font-size="12">iOS &amp; Android users</text>

<line x1="340" y1="76" x2="340" y2="108" stroke="#8892A8" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Presentation Layer -->
<rect x="40" y="110" width="600" height="140" rx="16" fill="none" stroke="#3A4560" stroke-dasharray="4 4"/>
<text x="340" y="136" class="layer-title">Presentation layer</text>

<g>
  <rect x="60" y="166" width="173" height="56" class="box-purple"/>
  <text x="146.5" y="184" class="box-text" font-size="14" fill="#A29BFE">Navigation</text>
  <text x="146.5" y="202" class="box-sub" font-size="12" fill="#6C5CE7">Tab &amp; stack nav</text>
</g>
<g>
  <rect x="253" y="166" width="173" height="56" class="box-purple"/>
  <text x="339.5" y="184" class="box-text" font-size="14" fill="#A29BFE">Screens &amp; forms</text>
  <text x="339.5" y="202" class="box-sub" font-size="12" fill="#6C5CE7">Validated forms</text>
</g>
<g>
  <rect x="446" y="166" width="173" height="56" class="box-purple"/>
  <text x="532.5" y="184" class="box-text" font-size="14" fill="#A29BFE">UI components</text>
  <text x="532.5" y="202" class="box-sub" font-size="12" fill="#6C5CE7">Lists &amp; images</text>
</g>

<line x1="340" y1="250" x2="340" y2="268" stroke="#8892A8" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- State Management -->
<rect x="40" y="270" width="600" height="140" rx="16" fill="none" stroke="#3A4560" stroke-dasharray="4 4"/>
<text x="340" y="296" class="layer-title">State management</text>

<g>
  <rect x="60" y="326" width="270" height="56" class="box-green"/>
  <text x="195" y="344" class="box-text" font-size="14" fill="#81ECEC">Redux Toolkit</text>
  <text x="195" y="362" class="box-sub" font-size="12" fill="#00CEC9">Global app state</text>
</g>
<g>
  <rect x="350" y="326" width="270" height="56" class="box-green"/>
  <text x="485" y="344" class="box-text" font-size="14" fill="#81ECEC">Redux Persist</text>
  <text x="485" y="362" class="box-sub" font-size="12" fill="#00CEC9">Persisted to disk</text>
</g>

<line x1="340" y1="410" x2="340" y2="428" stroke="#8892A8" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Native Modules & Storage -->
<rect x="40" y="430" width="600" height="140" rx="16" fill="none" stroke="#3A4560" stroke-dasharray="4 4"/>
<text x="340" y="456" class="layer-title">Native modules &amp; storage</text>

<g>
  <rect x="60" y="486" width="173" height="56" class="box-orange"/>
  <text x="146.5" y="504" class="box-text" font-size="14" fill="#FAB1A0">Camera &amp; files</text>
  <text x="146.5" y="522" class="box-sub" font-size="12" fill="#E17055">Camera, file picker</text>
</g>
<g>
  <rect x="253" y="486" width="173" height="56" class="box-orange"/>
  <text x="339.5" y="504" class="box-text" font-size="14" fill="#FAB1A0">Geo &amp; biometrics</text>
  <text x="339.5" y="522" class="box-sub" font-size="12" fill="#E17055">Face ID, geofencing</text>
</g>
<g>
  <rect x="446" y="486" width="173" height="56" class="box-orange"/>
  <text x="532.5" y="504" class="box-text" font-size="14" fill="#FAB1A0">MMKV &amp; Keychain</text>
  <text x="532.5" y="522" class="box-sub" font-size="12" fill="#E17055">Cache &amp; secure store</text>
</g>

<line x1="340" y1="570" x2="340" y2="588" stroke="#8892A8" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Networking & Notifications -->
<rect x="40" y="590" width="600" height="140" rx="16" fill="none" stroke="#3A4560" stroke-dasharray="4 4"/>
<text x="340" y="616" class="layer-title">Networking &amp; notifications</text>

<g>
  <rect x="60" y="646" width="270" height="56" class="box-blue"/>
  <text x="195" y="664" class="box-text" font-size="14" fill="#A29BFE">REST API client</text>
  <text x="195" y="682" class="box-sub" font-size="12" fill="#6C5CE7">Axios HTTP requests</text>
</g>
<g>
  <rect x="350" y="646" width="270" height="56" class="box-blue"/>
  <text x="485" y="664" class="box-text" font-size="14" fill="#A29BFE">Push notifications</text>
  <text x="485" y="682" class="box-sub" font-size="12" fill="#6C5CE7">Notifee + Firebase FCM</text>
</g>

<line x1="195" y1="702" x2="195" y2="764" stroke="#8892A8" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="485" y1="702" x2="485" y2="764" stroke="#8892A8" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- External Services -->
<g>
  <rect x="60" y="766" width="270" height="56" class="box-gray"/>
  <text x="195" y="784" class="box-text" font-size="14" fill="#E8EDF5">Backend API server</text>
  <text x="195" y="802" class="box-sub" font-size="12" fill="#8892A8">LME application server</text>
</g>
<g>
  <rect x="350" y="766" width="270" height="56" class="box-gray"/>
  <text x="485" y="784" class="box-text" font-size="14" fill="#E8EDF5">Firebase Cloud Messaging</text>
  <text x="485" y="802" class="box-sub" font-size="12" fill="#8892A8">Push delivery service</text>
</g>
</svg>
